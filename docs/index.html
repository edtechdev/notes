he right type of statistician to be one most like himself.&quot;,536870917]],[&quot;^1?&quot;,[409,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[409,&quot;^K&quot;,408,536870917]],[&quot;^1?&quot;,[409,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4663,&quot;^1G&quot;,4914],536870917]],[&quot;^1?&quot;,[409,&quot;^15&quot;,101,536870917]],[&quot;^1?&quot;,[409,&quot;^11&quot;,407,536870917]],[&quot;^1?&quot;,[409,&quot;^10&quot;,176,536870917]],[&quot;^1?&quot;,[409,&quot;^L&quot;,176,536870917]],[&quot;^1?&quot;,[409,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[409,&quot;^?&quot;,&quot;~u61b75dc0-ebd7-4e17-a089-01ccf61f2926&quot;,536870917]],[&quot;^1?&quot;,[410,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[410,&quot;^Y&quot;,&quot;&gt;Pretending to answer them under a veil of [[objectivity]] serves to dehumanize our colleagues&quot;,536870917]],[&quot;^1?&quot;,[410,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[410,&quot;^K&quot;,409,536870917]],[&quot;^1?&quot;,[410,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4914,&quot;^1G&quot;,5013],536870917]],[&quot;^1?&quot;,[410,&quot;^15&quot;,101,536870917]],[&quot;^1?&quot;,[410,&quot;^11&quot;,407,536870917]],[&quot;^1?&quot;,[410,&quot;^10&quot;,172,536870917]],[&quot;^1?&quot;,[410,&quot;^L&quot;,172,536870917]],[&quot;^1?&quot;,[410,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[410,&quot;^?&quot;,&quot;~u61b75dc0-4055-4e0d-bf9b-c08626e535a8&quot;,536870917]],[&quot;^1?&quot;,[411,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[411,&quot;^Y&quot;,&quot;&gt;In the 1972 book [[Social Science]]s as Sorcery, Stanislav Andreski argued that, in their search for [[objectivity]], researchers had settled for a cheap version of it, hiding behind statistical methods as “quantitative camouflage.” Instead, we should strive for the moral objectivity we need to simultaneously live in the world and study it. #quote&quot;,536870917]],[&quot;^1?&quot;,[411,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[411,&quot;^K&quot;,410,536870917]],[&quot;^1?&quot;,[411,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5013,&quot;^1G&quot;,5372],536870917]],[&quot;^1?&quot;,[411,&quot;^15&quot;,101,536870917]],[&quot;^1?&quot;,[411,&quot;^11&quot;,407,536870917]],[&quot;^1?&quot;,[411,&quot;^10&quot;,132,536870917]],[&quot;^1?&quot;,[411,&quot;^10&quot;,172,536870917]],[&quot;^1?&quot;,[411,&quot;^10&quot;,196,536870917]],[&quot;^1?&quot;,[411,&quot;^L&quot;,132,536870917]],[&quot;^1?&quot;,[411,&quot;^L&quot;,172,536870917]],[&quot;^1?&quot;,[411,&quot;^L&quot;,196,536870917]],[&quot;^1?&quot;,[411,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[411,&quot;^?&quot;,&quot;~u61b75dc0-fa67-4c71-b498-9a8070c548d3&quot;,536870917]],[&quot;^1?&quot;,[412,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[412,&quot;^Y&quot;,&quot;&gt;a scientific hypothesis is never just a statistical hypothesis—that two means in the population are different, that two variables are correlated, that a treatment has some nonzero effect—but an attempt at explaining why, by how much, and why it matters. The fact that significance testing ignores this is what economists Deirdre McCloskey and Stephen Ziliak in their 2008 book The Cult of [[Statistical Significance]] called the “sizeless stare of statistical significance.” As they put it, “Statistical significance is not a scientific test. It is a philosophical, qualitative test. It does not ask how much. It asks ‘whether,’ ”—as in, whether an effect or association simply exists. “Existence, the question of whether, is interesting,” they said, “but it is not scientific.”&quot;,536870917]],[&quot;^1?&quot;,[412,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[412,&quot;^K&quot;,411,536870917]],[&quot;^1?&quot;,[412,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5372,&quot;^1G&quot;,6182],536870917]],[&quot;^1?&quot;,[412,&quot;^15&quot;,101,536870917]],[&quot;^1?&quot;,[412,&quot;^11&quot;,407,536870917]],[&quot;^1?&quot;,[412,&quot;^10&quot;,127,536870917]],[&quot;^1?&quot;,[412,&quot;^L&quot;,127,536870917]],[&quot;^1?&quot;,[412,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[412,&quot;^?&quot;,&quot;~u61b75dc0-ab9c-4c59-a45c-a02fe0edffd5&quot;,536870917]],[&quot;^1?&quot;,[413,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[413,&quot;^Y&quot;,&quot;&gt;In the context of eugenics, it’s understandable why Galton, Pearson, and Fisher would care so much about questions of existence. For the purposes of eugenic discrimination, it was enough to state that distinct racial subgroups existed or there was a “significant” correlation between intelligence and cleanliness or a “significant” difference in criminality, fertility, or disease incidence between people of different socioeconomic classes. The first hypotheses were taxonomic: whether individuals could be considered to be of the same species, or whether people were of the same race. The separation was everything—not how much, what else might explain it, or why it mattered, just that it was there. Significance testing did not spring fully formed from the heads of these men. It was crafted and refined over the years specifically to articulate evolutionary and eugenicist arguments. Galton, Pearson, and Fisher the eugenicists needed a quantitative way to argue for the existence of such differences, and Galton, Pearson, and Fisher the statisticians answered the call with significance testing.&quot;,536870917]],[&quot;^1?&quot;,[413,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[413,&quot;^K&quot;,412,536870917]],[&quot;^1?&quot;,[413,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,6182,&quot;^1G&quot;,7301],536870917]],[&quot;^1?&quot;,[413,&quot;^15&quot;,10
