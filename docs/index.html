Y&quot;,&quot;&gt;A good manager can’t white-knuckle the work; they have to trust in and empower their staff.&quot;,536870917]],[&quot;^1?&quot;,[349,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[349,&quot;^K&quot;,348,536870917]],[&quot;^1?&quot;,[349,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2468,&quot;^1G&quot;,2567],536870917]],[&quot;^1?&quot;,[349,&quot;^15&quot;,98,536870917]],[&quot;^1?&quot;,[349,&quot;^11&quot;,344,536870917]],[&quot;^1?&quot;,[349,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[349,&quot;^?&quot;,&quot;~u61b391c4-bb68-4e38-838a-805ce2699c15&quot;,536870917]],[&quot;^1?&quot;,[350,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[350,&quot;^Y&quot;,&quot;&gt;We’ve got to let go of the idea of manager as “boss.”&quot;,536870917]],[&quot;^1?&quot;,[350,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[350,&quot;^K&quot;,349,536870917]],[&quot;^1?&quot;,[350,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2567,&quot;^1G&quot;,2632],536870917]],[&quot;^1?&quot;,[350,&quot;^15&quot;,98,536870917]],[&quot;^1?&quot;,[350,&quot;^11&quot;,344,536870917]],[&quot;^1?&quot;,[350,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[350,&quot;^?&quot;,&quot;~u61b391c4-b3e4-4d41-b9d8-37141e37aa40&quot;,536870917]],[&quot;^1?&quot;,[351,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[351,&quot;^Y&quot;,&quot;&gt;Before asking for feedback, consider why you want to do that and how you plan to use what you learn. If you don’t have any plan for actually using the feedback, don’t ask for it. There is nothing worse than taking the time to thoughtfully provide feedback on something only to be completely ignored.&quot;,536870917]],[&quot;^1?&quot;,[351,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[351,&quot;^K&quot;,350,536870917]],[&quot;^1?&quot;,[351,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2632,&quot;^1G&quot;,2941],536870917]],[&quot;^1?&quot;,[351,&quot;^15&quot;,98,536870917]],[&quot;^1?&quot;,[351,&quot;^11&quot;,344,536870917]],[&quot;^1?&quot;,[351,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[351,&quot;^?&quot;,&quot;~u61b391c4-f5ce-45c1-bb78-1fc1583e7644&quot;,536870917]],[&quot;^1?&quot;,[352,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[352,&quot;^Y&quot;,&quot;&gt;A manager who is really concerned with diversity, equity, and inclusion knows that making progress on this work requires empowering and giving voice to those with the least power in the organization. But in places with fearful or autocratic management, you sometimes see the (often White) people at the top running DEI work and deciding how that learning and engagement will trickle down to the (often more diverse) staff, some of whom may actually even have experience with this sort of work in other settings.&quot;,536870917]],[&quot;^1?&quot;,[352,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[352,&quot;^K&quot;,351,536870917]],[&quot;^1?&quot;,[352,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2941,&quot;^1G&quot;,3458],536870917]],[&quot;^1?&quot;,[352,&quot;^15&quot;,98,536870917]],[&quot;^1?&quot;,[352,&quot;^11&quot;,344,536870917]],[&quot;^1?&quot;,[352,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[352,&quot;^?&quot;,&quot;~u61b391c4-127c-424c-83e3-ffd05e0fc043&quot;,536870917]],[&quot;^1?&quot;,[353,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[353,&quot;^Y&quot;,&quot;&gt;“Listening theater” feels like gaslighting. In the moment, you might really feel like you’re being heard, but when your manager never takes action on anything you’ve discussed, you begin to feel like a ghost — like you’re talking to someone who literally doesn’t see or hear you. You question yourself — are your suggestions terrible? Really stupid? Is your manager just humoring you in the moment? Maybe there’s something wrong with you. You start to feel too embarrassed to bring things up (because clearly your ideas are truly awful).&quot;,536870917]],[&quot;^1?&quot;,[353,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[353,&quot;^K&quot;,352,536870917]],[&quot;^1?&quot;,[353,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,3458,&quot;^1G&quot;,4019],536870917]],[&quot;^1?&quot;,[353,&quot;^15&quot;,98,536870917]],[&quot;^1?&quot;,[353,&quot;^11&quot;,344,536870917]],[&quot;^1?&quot;,[353,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[353,&quot;^?&quot;,&quot;~u61b391c4-d59b-40c1-bf08-cd8962204341&quot;,536870917]],[&quot;^1?&quot;,[354,&quot;^1A&quot;,[&quot;^1B&quot;,[[&quot;^?&quot;,&quot;~u61b391c4-170a-4df1-9f70-944403bb725a&quot;]]],536870917]],[&quot;^1?&quot;,[354,&quot;^Y&quot;,&quot;[What Good Feedback Really Looks Like](https://hbr.org/2019/05/what-good-feedback-really-looks-like)&quot;,536870917]],[&quot;^1?&quot;,[354,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[354,&quot;^K&quot;,344,536870917]],[&quot;^1?&quot;,[354,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4019,&quot;^1G&quot;,4123],536870917]],[&quot;^1?&quot;,[354,&quot;^15&quot;,98,536870917]],[&quot;^1?&quot;,[354,&quot;^11&quot;,98,536870917]],[&quot;^1?&quot;,[354,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[354,&quot;^?&quot;,&quot;~u61b391c4-b18a-4963-82c1-7fd1382e4085&quot;,536870917]],[&quot;^1?&quot;,[355,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[355,&quot;^Y&quot;,&quot;[[Constructive criticism]], [[Feedback]]&quot;,536870917]],[&quot;^1?&quot;,[355,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[355,&quot;^K&quot;,354,536870917]],[&quot;^1?&quot;,[355,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4123,&quot;^1G&quot;,4168],536870917]],[&quot;^1?&quot;,[355,&quot;^15& 63,&quot;^15&quot;,98,536870917]],[&quot;^1?&quot;,[363,&quot;^11&quot;,360,536870917]],[&quot;^1?&quot;,[363,&quot;^10&quot;,159,536870917]],[&quot;^1?&quot;,[363,&quot;^L&quot;,159,536870917]],[&quot;^1?&quot;,[363,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[363,&quot;^?&quot;,&quot;~u61b391c4-821e-4131-a6db-977ca5119164&quot;,536870917]],[&quot;^1?&quot;,[364,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[364,&quot;^Y&quot;,&quot;&gt;In the 1972 book [[Social Science]]s as Sorcery, Stanislav Andreski argued that, in their search for [[objectivity]], researchers had settled for a cheap version of it, hiding behind statistical methods as “quantitative camouflage.” Instead, we should strive for the moral objectivity we need to simultaneously live in the world and study it. #quote&quot;,536870917]],[&quot;^1?&quot;,[364,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[364,&quot;^K&quot;,363,536870917]],[&quot;^1?&quot;,[364,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5013,&quot;^1G&quot;,5372],536870917]],[&quot;^1?&quot;,[364,&quot;^15&quot;,98,536870917]],[&quot;^1?&quot;,[364,&quot;^11&quot;,360,536870917]],[&quot;^1?&quot;,[364,&quot;^10&quot;,127,536870917]],[&quot;^1?&quot;,[364,&quot;^10&quot;,159,536870917]],[&quot;^1?&quot;,[364,&quot;^10&quot;,180,536870917]],[&quot;^1?&quot;,[364,&quot;^L&quot;,127,536870917]],[&quot;^1?&quot;,[364,&quot;^L&quot;,159,536870917]],[&quot;^1?&quot;,[364,&quot;^L&quot;,180,536870917]],[&quot;^1?&quot;,[364,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[364,&quot;^?&quot;,&quot;~u61b391c4-452e-493d-863e-4632e9a2411b&quot;,536870917]],[&quot;^1?&quot;,[365,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[365,&quot;^Y&quot;,&quot;&gt;a scientific hypothesis is never just a statistical hypothesis—that two means in the population are different, that two variables are correlated, that a treatment has some nonzero effect—but an attempt at explaining why, by how much, and why it matters. The fact that significance testing ignores this is what economists Deirdre McCloskey and Stephen Ziliak in their 2008 book The Cult of [[Statistical Significance]] called the “sizeless stare of statistical significance.” As they put it, “Statistical significance is not a scientific test. It is a philosophical, qualitative test. It does not ask how much. It asks ‘whether,’ ”—as in, whether an effect or association simply exists. “Existence, the question of whether, is interesting,” they said, “but it is not scientific.”&quot;,536870917]],[&quot;^1?&quot;,[365,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[365,&quot;^K&quot;,364,536870917]],[&quot;^1?&quot;,[365,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5372,&quot;^1G&quot;,6182],536870917]],[&quot;^1?&quot;,[365,&quot;^15&quot;,98,536870917]],[&quot;^1?&quot;,[365,&quot;^11&quot;,360,536870917]],[&quot;^1?&quot;,[365,&quot;^10&quot;,123,536870917]],[&quot;^1?&quot;,[365,&quot;^L&quot;,123,536870917]],[&quot;^1?&quot;,[365,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[365,&quot;^?&quot;,&quot;~u61b391c4-b1da-424c-8513-89552df70e42&quot;,536870917]],[&quot;^1?&quot;,[366,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[366,&quot;^Y&quot;,&quot;&gt;In the context of eugenics, it’s understandable why Galton, Pearson, and Fisher would care so much about questions of existence. For the purposes of eugenic discrimination, it was enough to state that distinct racial subgroups existed or there was a “significant” correlation between intelligence and cleanliness or a “significant” difference in criminality, fertility, or disease incidence between people of different socioeconomic classes. The first hypotheses were taxonomic: whether individuals could be considered to be of the same species, or whether people were of the same race. The separation was everything—not how much, what else might explain it, or why it mattered, just that it was there. Significance testing did not spring fully formed from the heads of these men. It was crafted and refined over the years specifically to articulate evolutionary and eugenicist arguments. Galton, Pearson, and Fisher the eugenicists needed a quantitative way to argue for the existence of such differences, and Galton, Pearson, and Fisher the statisticians answered the call with significance testing.&quot;,536870917]],[&quot;^1?&quot;,[366,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[366,&quot;^K&quot;,365,536870917]],[&quot;^1?&quot;,[366,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,6182,&quot;^1G&quot;,7301],536870917]],[&quot;^1?&quot;,[366,&quot;^15&quot;,98,536870917]],[&quot;^1?&quot;,[366,&quot;^11&quot;,360,536870917]],[&quot;^1?&quot;,[366,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[366,&quot;^?&quot;,&quot;~u61b391c4-9e1f-4869-90a6-a044c85fde88&quot;,536870917]],[&quot;^1?&quot;,[367,&quot;^1A&quot;,[&quot;^1B&quot;,[[&quot;^?&quot;,&quot;~u61b391c4-220c-44aa-a1c4-68f6a32c1aab&quot;],[&quot;^?&quot;,&quot;~u61b391c4-3a42-46b8-9255-624a891293e0&quot;]]],536870917]],[&quot;^1?&quot;,[367,&quot;^Y&quot;,&quot;[Efforts to Toughen Teacher Evaluations Show No Positive Impact on Students](https://www.edweek.org/teaching-learning/efforts-to-toughen-teacher-evaluations-show-no-positive-impact-on-students/2021/11)&quot;,536870917]],[&quot;^1?&quot;,[367,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[367,&quot;^K&quot;,360,536870917]],[&quot;^1?&quot;,[367,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,7301,&quot;^1G&quot;,7506],536870917]],[&quot;^1?&quot;,[367,&quot;^15&quot;,98,536870917]],[&quot;^1?&quot;,[367,&quot;^11&quot;,98,536870917]],[&quot;^1?&quot;,[367,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[367,&quot;^?&quot;,&quot;~u61b391c4-a863-4bc7-a99f-4b6f928c6922&quot;,536870917]],[&quot;^1?&
