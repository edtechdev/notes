;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[403,&quot;^Y&quot;,&quot;&gt;A good manager can’t white-knuckle the work; they have to trust in and empower their staff.&quot;,536870919]],[&quot;^1?&quot;,[403,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[403,&quot;^K&quot;,402,536870919]],[&quot;^1?&quot;,[403,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,2468,&quot;^1H&quot;,2567],536870919]],[&quot;^1?&quot;,[403,&quot;^15&quot;,103,536870919]],[&quot;^1?&quot;,[403,&quot;^11&quot;,398,536870919]],[&quot;^1?&quot;,[403,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[403,&quot;^?&quot;,&quot;~u61b891f6-862a-4751-890c-5febf577d678&quot;,536870919]],[&quot;^1?&quot;,[404,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[404,&quot;^Y&quot;,&quot;&gt;We’ve got to let go of the idea of manager as “boss.”&quot;,536870919]],[&quot;^1?&quot;,[404,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[404,&quot;^K&quot;,403,536870919]],[&quot;^1?&quot;,[404,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,2567,&quot;^1H&quot;,2632],536870919]],[&quot;^1?&quot;,[404,&quot;^15&quot;,103,536870919]],[&quot;^1?&quot;,[404,&quot;^11&quot;,398,536870919]],[&quot;^1?&quot;,[404,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[404,&quot;^?&quot;,&quot;~u61b891f6-7917-40b1-829a-03db62f03822&quot;,536870919]],[&quot;^1?&quot;,[405,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[405,&quot;^Y&quot;,&quot;&gt;Before asking for feedback, consider why you want to do that and how you plan to use what you learn. If you don’t have any plan for actually using the feedback, don’t ask for it. There is nothing worse than taking the time to thoughtfully provide feedback on something only to be completely ignored.&quot;,536870919]],[&quot;^1?&quot;,[405,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[405,&quot;^K&quot;,404,536870919]],[ lf — are your suggestions terrible? Really stupid? Is your manager just humoring you in the moment? Maybe there’s something wrong with you. You start to feel too embarrassed to bring things up (because clearly your ideas are truly awful).&quot;,536870919]],[&quot;^1?&quot;,[407,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[407,&quot;^K&quot;,406,536870919]],[&quot;^1?&quot;,[407,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,3458,&quot;^1H&quot;,4019],536870919]],[&quot;^1?&quot;,[407,&quot;^15&quot;,103,536870919]],[&quot;^1?&quot;,[407,&quot;^11&quot;,398,536870919]],[&quot;^1?&quot;,[407,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[407,&quot;^?&quot;,&quot;~u61b891f6-ea94-48a7-a2f9-5020402f8dfd&quot;,536870919]],[&quot;^1?&quot;,[408,&quot;^1C&quot;,[&quot;^1D&quot;,[[&quot;^?&quot;,&quot;~u61b891f6-5f88-431b-aeb4-48e39402cb21&quot;]]],536870919]],[&quot;^1?&quot;,[408,&quot;^Y&quot;,&quot;[What Good Feedback Really Looks Like](https://hbr.org/2019/05/what-good-feedback-really-looks-like)&quot;,536870919]],[&quot;^1?&quot;,[408,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[408,&quot;^K&quot;,398,536870919]],[&quot;^1?&quot;,[408,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,4019,&quot;^1H&quot;,4123],536870919]],[&quot;^1?&quot;,[408,&quot;^15&quot;,103,536870919]],[&quot;^1?&quot;,[408,&quot;^11&quot;,103,536870919]],[&quot;^1?&quot;,[408,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[408,&quot;^?&quot;,&quot;~u61b891f6-61c8-4247-b329-3bd01bfc3a32&quot;,536870919]],[&quot;^1?&quot;,[409,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[409,&quot;^Y&quot;,&quot;[[Constructive criticism]], [[Feedback]]&quot;,536870919]],[&quot;^1?&quot;,[409,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[409,&quot;^K&quot;,408,536870919]],[&quot;^1?&quot;,[409,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^ uot;^1F&quot;,[],&quot;^1G&quot;,4914,&quot;^1H&quot;,5013],536870919]],[&quot;^1?&quot;,[417,&quot;^15&quot;,103,536870919]],[&quot;^1?&quot;,[417,&quot;^11&quot;,414,536870919]],[&quot;^1?&quot;,[417,&quot;^10&quot;,177,536870919]],[&quot;^1?&quot;,[417,&quot;^L&quot;,177,536870919]],[&quot;^1?&quot;,[417,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[417,&quot;^?&quot;,&quot;~u61b891f6-5e6b-4251-a811-5a92922a3fc5&quot;,536870919]],[&quot;^1?&quot;,[418,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[418,&quot;^Y&quot;,&quot;&gt;In the 1972 book [[Social Science]]s as Sorcery, Stanislav Andreski argued that, in their search for [[objectivity]], researchers had settled for a cheap version of it, hiding behind statistical methods as “quantitative camouflage.” Instead, we should strive for the moral objectivity we need to simultaneously live in the world and study it. #quote&quot;,536870919]],[&quot;^1?&quot;,[418,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[418,&quot;^K&quot;,417,536870919]],[&quot;^1?&quot;,[418,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,5013,&quot;^1H&quot;,5372],536870919]],[&quot;^1?&quot;,[418,&quot;^15&quot;,103,536870919]],[&quot;^1?&quot;,[418,&quot;^11&quot;,414,536870919]],[&quot;^1?&quot;,[418,&quot;^10&quot;,136,536870919]],[&quot;^1?&quot;,[418,&quot;^10&quot;,177,536870919]],[&quot;^1?&quot;,[418,&quot;^10&quot;,201,536870919]],[&quot;^1?&quot;,[418,&quot;^L&quot;,136,536870919]],[&quot;^1?&quot;,[418,&quot;^L&quot;,177,536870919]],[&quot;^1?&quot;,[418,&quot;^L&quot;,201,536870919]],[&quot;^1?&quot;,[418,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[418,&quot;^?&quot;,&quot;~u61b891f6-7f81-4e88-bdd7-924edcff6901&quot;,536870919]],[&quot;^1?&quot;,[419,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[419,&quot;^Y&quot;,&quot;&gt;a scientific hypothesis is never just a statistical hypothesis—that two means in the population are different, that two variables are correlated, that a treatment has some nonzero effect—but an attempt at explaining why, by how much, and why it matters. The fact that significance testing ignores this is what economists Deirdre McCloskey and Stephen Ziliak in their 2008 book The Cult of [[Statistical Significance]] called the “sizeless stare of statistical significance.” As they put it, “Statistical significance is not a scientific test. It is a philosophical, qualitative test. It does not ask how much. It asks ‘whether,’ ”—as in, whether an effect or association simply exists. “Existence, the question of whether, is interesting,” they said, “but it is not scientific.”&quot;,536870919]],[&quot;^1?&quot;,[419,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[419,&quot;^K&quot;,418,536870919]],[&quot;^1?&quot;,[419,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,5372,&quot;^1H&quot;,6182],536870919]],[&quot;^1?&quot;,[419,&quot;^15&quot;,103,536870919]],[&quot;^1?&quot;,[419,&quot;^11&quot;,414,536870919]],[&quot;^1?&quot;,[419,&quot;^10&quot;,130,536870919]],[&quot;^1?&quot;,[419,&quot;^L&quot;,130,536870919]],[&quot;^1?&quot;,[419,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[419,&quot;^?&quot;,&quot;~u61b891f6-d12e-47c3-9ae4-fd521286ae2c&quot;,536870919]],[&quot;^1?&quot;,[420,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[420,&quot;^Y&quot;,&quot;&gt;In the context of eugenics, it’s understandable why Galton, Pearson, and Fisher would care so much about questions of existence. For the purposes of eugenic discrimination, it was enough to state that distinct racial subgroups existed or there was a “significant” correlation between intelligence and cleanliness or a “significant” difference in criminality, fertility, or disease incidence between people of different socioeconomic classes. The first hypotheses were taxonomic: whether individuals could be considered to be of the same species, or whether
