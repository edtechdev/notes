quot;,true,536870919]],[&quot;^1?&quot;,[385,&quot;^?&quot;,&quot;~u61b741a2-6e1c-4abf-811b-dedb0066c233&quot;,536870919]],[&quot;^1?&quot;,[386,&quot;^1B&quot;,[&quot;^1C&quot;,[]],536870919]],[&quot;^1?&quot;,[386,&quot;^Y&quot;,&quot;&gt;We’ve got to let go of the idea of manager as “boss.”&quot;,536870919]],[&quot;^1?&quot;,[386,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[386,&quot;^K&quot;,385,536870919]],[&quot;^1?&quot;,[386,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2567,&quot;^1G&quot;,2632],536870919]],[&quot;^1?&quot;,[386,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[386,&quot;^11&quot;,380,536870919]],[&quot;^1?&quot;,[386,&quot;^1H&quot;,true,536870919]],[&quot;^1?&quot;,[386,&quot;^?&quot;,&quot;~u61b741a2-2760-4c68-9242-7f7800d4926d&quot;,536870919]],[&quot;^1?&quot;,[387,&quot;^1B&quot;,[&quot;^1C&quot;,[]],536870919]],[&quot;^1?&quot;,[387,&quot;^Y&quot;,&quot;&gt;Before asking for feedback, consider why you want to do that and how you plan to use what you learn. If you don’t have any plan for actually using the feedback, don’t ask for it. There is nothing worse than taking the time to thoughtfully provide feedback on something only to be completely ignored.&quot;,536870919]],[&quot;^1?&quot;,[387,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[387,&quot;^K&quot;,386,536870919]],[&quot;^1?&quot;,[387,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2632,&quot;^1G&quot;,2941],536870919]],[&quot;^1?&quot;,[387,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[387,&quot;^11&quot;,380,536870919]],[&quot;^1?&quot;,[387,&quot;^1H&quot;,true,536870919]],[&quot;^1?&quot;,[387,&quot;^?&quot;,&quot;~u61b741a2-d31f-4155-8944-f69c0898cf6f&quot;,536870919]],[&quot;^1?&quot;,[388,&quot;^1B&quot;,[&quot;^1C&quot;,[]],536870919]],[&quot;^1?&quot;,[388,&quot;^Y&quot;,&quot;&gt;A manager who is really concerned with diversity, equity, and inclusion knows that making progress on this work requires empowering and giving voice to those with the least power in the organization. But in places with fearful or autocratic management, you sometimes see the (often White) people at the top running DEI work and deciding how that learning and engagement will trickle down to the (often more diverse) staff, some of whom may actually even have experience with this sort of work in other settings.&quot;,536870919]],[&quot;^1?&quot;,[388,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[388,&quot;^K&quot;,387,536870919]],[&quot;^1?&quot;,[388,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2941,&quot;^1G&quot;,3458],536870919]],[&quot;^1?&quot;,[388,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[388,&quot;^11&quot;,380,536870919]],[&quot;^1?&quot;,[388,&quot;^1H&quot;,true,536870919]],[&quot;^1?&quot;,[388,&quot;^?&quot;,&quot;~u61b741a2-1078-45f7-bfbe-0c53b0e3fb4b&quot;,536870919]],[&quot;^1?&quot;,[389,&quot;^1B&quot;,[&quot;^1C&quot;,[]],536870919]],[&quot;^1?&quot;,[389,&quot;^Y&quot;,&quot;&gt;“Listening theater” feels like gaslighting. In the moment, you might really feel like you’re being heard, but when your manager never takes action on anything you’ve discussed, you begin to feel like a ghost — like you’re talking to someone who literally doesn’t see or hear you. You question yourself — are your suggestions terrible? Really stupid? Is your manager just humoring you in the moment? Maybe there’s something wrong with you. You start to feel too embarrassed to bring things up (because clearly your ideas are truly awful).&quot;,536870919]],[&quot;^1?&quot;,[389,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[389,&quot;^K&quot;,388,536870919]],[&quot;^1?&quot;,[389,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,3458,&quot;^1G&quot;,4019],536870919]],[&quot;^1?&quot;,[389,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[389,&quot;^1 t;^1C&quot;,[]],536870919]],[&quot;^1?&quot;,[398,&quot;^Y&quot;,&quot;&gt;[[Gatekeeping]]: Fisher acted as a gatekeeper for the profession of statistics, encouraging what he considered to be the right types to enter, and as his words make clear, he considered the right type of statistician to be one most like himself.&quot;,536870919]],[&quot;^1?&quot;,[398,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[398,&quot;^K&quot;,397,536870919]],[&quot;^1?&quot;,[398,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4663,&quot;^1G&quot;,4914],536870919]],[&quot;^1?&quot;,[398,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[398,&quot;^11&quot;,396,536870919]],[&quot;^1?&quot;,[398,&quot;^10&quot;,174,536870919]],[&quot;^1?&quot;,[398,&quot;^L&quot;,174,536870919]],[&quot;^1?&quot;,[398,&quot;^1H&quot;,true,536870919]],[&quot;^1?&quot;,[398,&quot;^?&quot;,&quot;~u61b741a2-6645-480c-a717-2a82a78da91c&quot;,536870919]],[&quot;^1?&quot;,[399,&quot;^1B&quot;,[&quot;^1C&quot;,[]],536870919]],[&quot;^1?&quot;,[399,&quot;^Y&quot;,&quot;&gt;Pretending to answer them under a veil of [[objectivity]] serves to dehumanize our colleagues&quot;,536870919]],[&quot;^1?&quot;,[399,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[399,&quot;^K&quot;,398,536870919]],[&quot;^1?&quot;,[399,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4914,&quot;^1G&quot;,5013],536870919]],[&quot;^1?&quot;,[399,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[399,&quot;^11&quot;,396,536870919]],[&quot;^1?&quot;,[399,&quot;^10&quot;,170,536870919]],[&quot;^1?&quot;,[399,&quot;^L&quot;,170,536870919]],[&quot;^1?&quot;,[399,&quot;^1H&quot;,true,536870919]],[&quot;^1?&quot;,[399,&quot;^?&quot;,&quot;~u61b741a2-2a95-4637-bf1b-06de435ec7ee&quot;,536870919]],[&quot;^1?&quot;,[400,&quot;^1B&quot;,[&quot;^1C&quot;,[]],536870919]],[&quot;^1?&quot;,[400,&quot;^Y&quot;,&quot;&gt;In the 1972 book [[Social Science]]s as Sorcery, Stanislav Andreski argued that, in their search for [[objectivity]], researchers had settled for a cheap version of it, hiding behind statistical methods as “quantitative camouflage.” Instead, we should strive for the moral objectivity we need to simultaneously live in the world and study it. #quote&quot;,536870919]],[&quot;^1?&quot;,[400,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[400,&quot;^K&quot;,399,536870919]],[&quot;^1?&quot;,[400,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5013,&quot;^1G&quot;,5372],536870919]],[&quot;^1?&quot;,[400,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[400,&quot;^11&quot;,396,536870919]],[&quot;^1?&quot;,[400,&quot;^10&quot;,131,536870919]],[&quot;^1?&quot;,[400,&quot;^10&quot;,170,536870919]],[&quot;^1?&quot;,[400,&quot;^10&quot;,194,536870919]],[&quot;^1?&quot;,[400,&quot;^L&quot;,131,536870919]],[&quot;^1?&quot;,[400,&quot;^L&quot;,170,536870919]],[&quot;^1?&quot;,[400,&quot;^L&quot;,194,536870919]],[&quot;^1?&quot;,[400,&quot;^1H&quot;,true,536870919]],[&quot;^1?&quot;,[400,&quot;^?&quot;,&quot;~u61b741a2-ba5a-408c-88ae-f20b34574b93&quot;,536870919]],[&quot;^1?&quot;,[401,&quot;^1B&quot;,[&quot;^1C&quot;,[]],536870919]],[&quot;^1?&quot;,[401,&quot;^Y&quot;,&quot;&gt;a scientific hypothesis is never just a statistical hypothesis—that two means in the population are different, that two variables are correlated, that a treatment has some nonzero effect—but an attempt at explaining why, by how much, and why it matters. The fact that significance testing ignores this is what economists Deirdre McCloskey and Stephen Ziliak in their 2008 book The Cult of [[Statistical Significance]] called the “sizeless stare of statistical significance.” As they put it, “Statistical significance is not a scientific test. It is a philosophical, qualitative test. It does not ask how much. It asks ‘whether,’ ”—as in, whether an effect or association simply exists. “Existence, the question
