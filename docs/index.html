;^10&quot;,205,536870917]],[&quot;^1?&quot;,[416,&quot;^10&quot;,215,536870917]],[&quot;^1?&quot;,[416,&quot;^L&quot;,205,536870917]],[&quot;^1?&quot;,[416,&quot;^L&quot;,215,536870917]],[&quot;^1?&quot;,[416,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[416,&quot;^?&quot;,&quot;~u61b8a1b7-b309-4601-b653-5832a85bf4c4&quot;,536870917]],[&quot;^1?&quot;,[417,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[417,&quot;^Y&quot;,&quot;&gt;The manager may actually care about the points of view of their staff, but not more than their need to be in control&quot;,536870917]],[&quot;^1?&quot;,[417,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[417,&quot;^K&quot;,416,536870917]],[&quot;^1?&quot;,[417,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2346,&quot;^1G&quot;,2468],536870917]],[&quot;^1?&quot;,[417,&quot;^15&quot;,103,536870917]],[&quot;^1?&quot;,[417,&quot;^11&quot;,413,536870917]],[&quot;^1?&quot;,[417,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[417,&quot;^?&quot;,&quot;~u61b8a1b7-25c4-4519-80cf-1a075ef9e945&quot;,536870917]],[&quot;^1?&quot;,[418,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[418,&quot;^Y&quot;,&quot;&gt;A good manager can’t white-knuckle the work; they have to trust in and empower their staff.&quot;,536870917]],[&quot;^1?&quot;,[418,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[418,&quot;^K&quot;,417,536870917]],[&quot;^1?&quot;,[418,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2468,&quot;^1G&quot;,2567],536870917]],[&quot;^1?&quot;,[418,&quot;^15&quot;,103,536870917]],[&quot;^1?&quot;,[418,&quot;^11&quot;,413,536870917]],[&quot;^1?&quot;,[418,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[418,&quot;^?&quot;,&quot;~u61b8a1b7-6478-4007-9de2-eeb73ec9820a&quot;,536870917]],[&quot;^1?&quot;,[419,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[419,&quot;^Y&quot;,&quot;&gt;We’ve got to let go of the idea of manager as “boss.”&quot;,536870917]],[&quot;^1?&quot;,[419,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[419,&quot;^K&quot;,418,536870917]],[&quot;^1?&quot;,[419,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2567,&quot;^1G&quot;,2632],536870917]],[&quot;^1?&quot;,[419,&quot;^15&quot;,103,536870917]],[&quot;^1?&quot;,[419,&quot;^11&quot;,413,536870917]],[&quot;^1?&quot;,[419,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[419,&quot;^?&quot;,&quot;~u61b8a1b7-aad7-498e-baeb-ec6e8be7bae5&quot;,536870917]],[&quot;^1?&quot;,[420,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[420,&quot;^Y&quot;,&quot;&gt;Before asking for feedback, consider why you want to do that and how you plan to use what you learn. If you don’t have any plan for actually using the feedback, don’t ask for it. There is nothing worse than taking the time to thoughtfully provide feedback on something only to be completely ignored.&quot;,536870917]],[&quot;^1?&quot;,[420,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[420,&quot;^K&quot;,419,536870917]],[&quot;^1?&quot;,[420,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2632,&quot;^1G&quot;,2941],536870917]],[&quot;^1?&quot;,[420,&quot;^15&quot;,103,536870917]],[&quot;^1?&quot;,[420,&quot;^11&quot;,413,536870917]],[&quot;^1?&quot;,[420,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[420,&quot;^?&quot;,&quot;~u61b8a1b7-d2ca-4832-83be-ea303cd96a55&quot;,536870917]],[&quot;^1?&quot;,[421,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[421,&quot;^Y&quot;,&quot;&gt;A manager who is really concerned with diversity, equity, and inclusion knows that making progress on this work requires empowering and giving voice to those with the least power in the organization. But in places with fearful or autocratic management, you sometimes see the (often White) people at the top running DEI work and deciding how that learning and engagement will trickle down to the (often more diverse) staff, some of whom may actually even have experience with this sort of work in other settings.&quot;,536870917]],[&quot;^1?&quot;,[421,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[421,&quot;^K&quot;,420,536870917]],[&quot;^1?&quot;,[421,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2941,&quot;^1G&quot;,3458],536870917]],[&quot;^1?&quot;,[421,&quot;^15&quot;,103,536870917]],[&quot;^1?&quot;,[421,&quot;^11&quot;,413,536870917]],[&quot;^1?&quot;,[421,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[421,&quot;^?&quot;,&quot;~u61b8a1b7-eade-44e0-8cc5-919570b0dc6b&quot;,536870917]],[&quot;^1?&quot;,[422,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[422,&quot;^Y&quot;,&quot;&gt;“Listening theater” feels like gaslighting. In the moment, you might really feel like you’re being heard, but when your manager never takes action on anything you’ve discussed, you begin to feel like a ghost — like you’re talking to someone who literally doesn’t see or hear you. You question yourself — are your suggestions terrible? Really stupid? Is your manager just humoring you in the moment? Maybe there’s something wrong with you. You start to feel too embarrassed to bring things up (because clearly your ideas are truly awful).&quot;,536870917]],[&quot;^1?&quot;,[422,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[422,&quot;^K&quot;,421,536870917]],[&quot;^1?&quot;,[422,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,3458,&quot;^1G&quot;,4019],536870917]],[&quot;^1?&quot;,[422,&quot;^15&quot;,103,536870917]],[&quot;^1?&quot;,[422,&quot;^11&quot;,413,536870917]],[&quot;^1?&quot;,[422,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[422,&quot;^?&quot;,&quot;~u61b8a1b7-3242-42cb-8ef4-136bb9229a01&quot;,536870917]],[&quot;^1?&quot;,[423,&quot;^1A&quot;,[&quot;^1B&quot;,[[&quot;^?&q  he considered the right type of statistician to be one most like himself.&quot;,536870917]],[&quot;^1?&quot;,[431,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[431,&quot;^K&quot;,430,536870917]],[&quot;^1?&quot;,[431,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4663,&quot;^1G&quot;,4914],536870917]],[&quot;^1?&quot;,[431,&quot;^15&quot;,103,536870917]],[&quot;^1?&quot;,[431,&quot;^11&quot;,429,536870917]],[&quot;^1?&quot;,[431,&quot;^10&quot;,185,536870917]],[&quot;^1?&quot;,[431,&quot;^L&quot;,185,536870917]],[&quot;^1?&quot;,[431,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[431,&quot;^?&quot;,&quot;~u61b8a1b7-c65a-4416-9064-37a722960686&quot;,536870917]],[&quot;^1?&quot;,[432,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[432,&quot;^Y&quot;,&quot;&gt;Pretending to answer them under a veil of [[objectivity]] serves to dehumanize our colleagues&quot;,536870917]],[&quot;^1?&quot;,[432,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[432,&quot;^K&quot;,431,536870917]],[&quot;^1?&quot;,[432,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4914,&quot;^1G&quot;,5013],536870917]],[&quot;^1?&quot;,[432,&quot;^15&quot;,103,536870917]],[&quot;^1?&quot;,[432,&quot;^11&quot;,429,536870917]],[&quot;^1?&quot;,[432,&quot;^10&quot;,181,536870917]],[&quot;^1?&quot;,[432,&quot;^L&quot;,181,536870917]],[&quot;^1?&quot;,[432,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[432,&quot;^?&quot;,&quot;~u61b8a1b7-cbf1-4f04-ad3c-bedfdfe134d1&quot;,536870917]],[&quot;^1?&quot;,[433,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[433,&quot;^Y&quot;,&quot;&gt;In the 1972 book [[Social Science]]s as Sorcery, Stanislav Andreski argued that, in their search for [[objectivity]], researchers had settled for a cheap version of it, hiding behind statistical methods as “quantitative camouflage.” Instead, we should strive for the moral objectivity we need to simultaneously live in the world and study it. #quote&quot;,536870917]],[&quot;^1?&quot;,[433,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[433,&quot;^K&quot;,432,536870917]],[&quot;^1?&quot;,[433,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5013,&quot;^1G&quot;,5372],536870917]],[&quot;^1?&quot;,[433,&quot;^15&quot;,103,536870917]],[&quot;^1?&quot;,[433,&quot;^11&quot;,429,536870917]],[&quot;^1?&quot;,[433,&quot;^10&quot;,137,536870917]],[&quot;^1?&quot;,[433,&quot;^10&quot;,181,536870917]],[&quot;^1?&quot;,[433,&quot;^10&quot;,206,536870917]],[&quot;^1?&quot;,[433,&quot;^L&quot;,137,536870917]],[&quot;^1?&quot;,[433,&quot;^L&quot;,181,536870917]],[&quot;^1?&quot;,[433,&quot;^L&quot;,206,536870917]],[&quot;^1?&quot;,[433,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[433,&quot;^?&quot;,&quot;~u61b8a1b7-3835-4447-95ec-888f31eb5363&quot;,536870917]],[&quot;^1?&quot;,[434,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[434,&quot;^Y&quot;,&quot;&gt;a scientific hypothesis is never just a statistical hypothesis—that two means in the population are different, that two variables are correlated, that a treatment has some nonzero effect—but an attempt at explaining why, by how much, and why it matters. The fact that significance testing ignores this is what economists Deirdre McCloskey and Stephen Ziliak in their 2008 book The Cult of [[Statistical Significance]] called the “sizeless stare of statistical significance.” As they put it, “Statistical significance is not a scientific test. It is a philosophical, qualitative test. It does not ask how much. It asks ‘whether,’ ”—as in, whether an effect or association simply exists. “Existence, the question of whether, is interesting,” they said, “but it is not scientific.”&quot;,536870917]],[&quot;^1?&quot;,[434,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[434,&quot;^K&quot;,433,536870917]],[&quot;^1?&quot;,[434,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5372,&quot;^1G&quot;,6182],536870917]],[&quot;^1?&quot;,[434,&quot;^15&quot;,103,536870917]],[&quot;^1?&quot;,[434,&quot;^11&quot;,429,536870917]],[&quot;^1?&quot;,[434,&quot;^10&quot;,131,536870917]],[&quot;^1?&quot;,[434,&quot;^L&quot;,131,536870917]],[&quot;^1?&quot;,[434,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[434,&quot;^?&quot;,&quot;~u61b8a1b7-9d1e-4853-814a-ae855d42e5f1&quot;,536870917]],[&quot;^1?&quot;,[435,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[435,&quot;^Y&quot;,&quot;&gt;In the context of eugenics, it’s understandable why Galton, Pearson, and Fisher would care so much about questions of existence. For the purposes of eugenic discrimination, it was enough to state that distinct racial subgroups existed or there was a “significant” correlation between intelligence and cleanliness or a “significant” difference in criminality, fertility, or disease incidence between people of different socioeconomic classes. The first hypotheses were taxonomic: whether individuals could be considered to be of the same species, or whether people were of the same race. The separation was everything—not how much, what else might explain it, or why it mattered, just that it was there. Significance testing did not spring fully formed from the heads of these men. It was crafted and refined over the years specifically to articulate evolutionary and eugenicist arguments. Galton, Pearson, and Fisher the eugenicists needed a quantitative way to argue for the existence of such differences, and Galton, Pearson, and Fisher the statisticians answered the call with significance testing.&quot;,536870917]],[&quot;^1?&quot;,[435,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[435,&quot;^K&quot;,434,536870917]],[&quot;^1?&quot;,[435,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,6182,&quot;^1G&quot;,7301],536870917]],[&quot;^1?&quot;,[435,&q
