) has been shown to be a critical element of successful [[workplace]] functioning in study after study.&quot;,536870917]],[&quot;^1?&quot;,[370,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[370,&quot;^K&quot;,369,536870917]],[&quot;^1?&quot;,[370,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2165,&quot;^1G&quot;,2346],536870917]],[&quot;^1?&quot;,[370,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[370,&quot;^11&quot;,367,536870917]],[&quot;^1?&quot;,[370,&quot;^10&quot;,187,536870917]],[&quot;^1?&quot;,[370,&quot;^10&quot;,197,536870917]],[&quot;^1?&quot;,[370,&quot;^L&quot;,187,536870917]],[&quot;^1?&quot;,[370,&quot;^L&quot;,197,536870917]],[&quot;^1?&quot;,[370,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[370,&quot;^?&quot;,&quot;~u61b5336d-9ab2-4a12-8ff4-c6a04c5fc968&quot;,536870917]],[&quot;^1?&quot;,[371,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[371,&quot;^Y&quot;,&quot;&gt;The manager may actually care about the points of view of their staff, but not more than their need to be in control&quot;,536870917]],[&quot;^1?&quot;,[371,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[371,&quot;^K&quot;,370,536870917]],[&quot;^1?&quot;,[371,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2346,&quot;^1G&quot;,2468],536870917]],[&quot;^1?&quot;,[371,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[371,&quot;^11&quot;,367,536870917]],[&quot;^1?&quot;,[371,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[371,&quot;^?&quot;,&quot;~u61b5336d-3858-4cbe-8c96-6da5aadba543&quot;,536870917]],[&quot;^1?&quot;,[372,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[372,&quot;^Y&quot;,&quot;&gt;A good manager can’t white-knuckle the work; they have to trust in and empower their staff.&quot;,536870917]],[&quot;^1?&quot;,[372,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[372,&quot;^K&quot;,371,536870917]],[&quot;^1?&quot;,[372,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2468,&quot;^1G&quot;,2567],536870917]],[&quot;^1?&quot;,[372,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[372,&quot;^11&quot;,367,536870917]],[&quot;^1?&quot;,[372,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[372,&quot;^?&quot;,&quot;~u61b5336d-e85f-4855-a1e0-9fc0918f2689&quot;,536870917]],[&quot;^1?&quot;,[373,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[373,&quot;^Y&quot;,&quot;&gt;We’ve got to let go of the idea of manager as “boss.”&quot;,536870917]],[&quot;^1?&quot;,[373,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[373,&quot;^K&quot;,372,536870917]],[&quot;^1?&quot;,[373,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2567,&quot;^1G&quot;,2632],536870917]],[&quot;^1?&quot;,[373,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[373,&quot;^11&quot;,367,536870917]],[&quot;^1?&quot;,[373,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[373,&quot;^?&quot;,&quot;~u61b5336d-bbb6-4d29-8227-c7fa8d266def&quot;,536870917]],[&quot;^1?&quot;,[374,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[374,&quot;^Y&quot;,&quot;&gt;Before asking for feedback, consider why you want to do that and how you plan to use what you learn. If you don’t have any plan for actually using the feedback, don’t ask for it. There is nothing worse than taking the time to thoughtfully provide feedback on something only to be completely ignored.&quot;,536870917]],[&quot;^1?&quot;,[374,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[374,&quot;^K&quot;,373,536870917]],[&quot;^1?&quot;,[374,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2632,&quot;^1G&quot;,2941],536870917]],[&quot;^1?&quot;,[374,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[374,&quot;^11&quot;,367,536870917]],[&quot;^1?&quot;,[374,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[374,&quot;^?&quot;,&quot;~u61b5336d-2dae-45b6-987d-13cf33553534&quot;,536870917]],[&quot;^1?&quot;,[375,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[375,&quot;^Y&quot;,&quot;&gt;A manager who is really concerned with diversity, equity, and inclusion knows that making progress on this work requires empowering and giving voice to those with the least power in the organization. But in places with fearful or autocratic management, you sometimes see the (often White) people at the top running DEI work and deciding how that learning and engagement will trickle down to the (often more diverse) staff, some of whom may actually even have experience with this sort of work in other settings.&quot;,536870917]],[&quot;^1?&quot;,[375,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[375,&quot;^K&quot;,374,536870917]],[&quot;^1?&quot;,[375,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2941,&quot;^1G&quot;,3458],536870917]],[&quot;^1?&quot;,[375,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[375,&quot;^11&quot;,367,536870917]],[&quot;^1?&quot;,[375,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[375,&quot;^?&quot;,&quot;~u61b5336d-9663-4e81-b425-cf79b09eaa55&quot;,536870917]],[&quot;^1?&quot;,[376,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[376,&quot;^Y&quot;,&quot;&gt;“Listening theater” feels like gaslighting. In the moment, you might really feel like you’re being heard, but when your manager never takes action on anything you’ve discussed, you begin to feel like a ghost — like you’re talking to someone who literally doesn’t see or hear you. You question yourself — are your suggestions terrible? Really stupid? Is your manager just humoring you in the moment? Maybe there’s something wrong with you. You start to feel too embarrassed to bring things up (because clearly your ideas are truly awful).&quot;,536870917]],[&quot;^1?&quot;,[376,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quo 17]],[&quot;^1?&quot;,[384,&quot;^L&quot;,147,536870917]],[&quot;^1?&quot;,[384,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[384,&quot;^?&quot;,&quot;~u61b5336d-2117-435c-a593-91dcde9a4c48&quot;,536870917]],[&quot;^1?&quot;,[385,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[385,&quot;^Y&quot;,&quot;&gt;[[Gatekeeping]]: Fisher acted as a gatekeeper for the profession of statistics, encouraging what he considered to be the right types to enter, and as his words make clear, he considered the right type of statistician to be one most like himself.&quot;,536870917]],[&quot;^1?&quot;,[385,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[385,&quot;^K&quot;,384,536870917]],[&quot;^1?&quot;,[385,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4663,&quot;^1G&quot;,4914],536870917]],[&quot;^1?&quot;,[385,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[385,&quot;^11&quot;,383,536870917]],[&quot;^1?&quot;,[385,&quot;^10&quot;,169,536870917]],[&quot;^1?&quot;,[385,&quot;^L&quot;,169,536870917]],[&quot;^1?&quot;,[385,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[385,&quot;^?&quot;,&quot;~u61b5336d-1b47-441b-b756-71165a498c53&quot;,536870917]],[&quot;^1?&quot;,[386,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[386,&quot;^Y&quot;,&quot;&gt;Pretending to answer them under a veil of [[objectivity]] serves to dehumanize our colleagues&quot;,536870917]],[&quot;^1?&quot;,[386,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[386,&quot;^K&quot;,385,536870917]],[&quot;^1?&quot;,[386,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4914,&quot;^1G&quot;,5013],536870917]],[&quot;^1?&quot;,[386,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[386,&quot;^11&quot;,383,536870917]],[&quot;^1?&quot;,[386,&quot;^10&quot;,165,536870917]],[&quot;^1?&quot;,[386,&quot;^L&quot;,165,536870917]],[&quot;^1?&quot;,[386,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[386,&quot;^?&quot;,&quot;~u61b5336d-c002-4159-a989-a908b1f7d6f8&quot;,536870917]],[&quot;^1?&quot;,[387,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[387,&quot;^Y&quot;,&quot;&gt;In the 1972 book [[Social Science]]s as Sorcery, Stanislav Andreski argued that, in their search for [[objectivity]], researchers had settled for a cheap version of it, hiding behind statistical methods as “quantitative camouflage.” Instead, we should strive for the moral objectivity we need to simultaneously live in the world and study it. #quote&quot;,536870917]],[&quot;^1?&quot;,[387,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[387,&quot;^K&quot;,386,536870917]],[&quot;^1?&quot;,[387,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5013,&quot;^1G&quot;,5372],536870917]],[&quot;^1?&quot;,[387,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[387,&quot;^11&quot;,383,536870917]],[&quot;^1?&quot;,[387,&quot;^10&quot;,128,536870917]],[&quot;^1?&quot;,[387,&quot;^10&quot;,165,536870917]],[&quot;^1?&quot;,[387,&quot;^10&quot;,188,536870917]],[&quot;^1?&quot;,[387,&quot;^L&quot;,128,536870917]],[&quot;^1?&quot;,[387,&quot;^L&quot;,165,536870917]],[&quot;^1?&quot;,[387,&quot;^L&quot;,188,536870917]],[&quot;^1?&quot;,[387,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[387,&quot;^?&quot;,&quot;~u61b5336d-5e55-4434-9492-b4f4517d7164&quot;,536870917]],[&quot;^1?&quot;,[388,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[388,&quot;^Y&quot;,&quot;&gt;a scientific hypothesis is never just a statistical hypothesis—that two means in the population are different, that two variables are correlated, that a treatment has some nonzero effect—but an attempt at explaining why, by how much, and why it matters. The fact that significance testing ignores this is what economists Deirdre McCloskey and Stephen Ziliak in their 2008 book The Cult of [[Statistical Significance]] called the “sizeless stare of statistical significance.” As they put it, “Statistical significance is not a scientific test. It is a philosophical, qualitative test. It does not ask how much. It asks ‘whether,’ ”—as in, whether an effect or association simply exists. “Existence, the question of whether, is interesting,” they said, “but it is not scientific.”&quot;,536870917]],[&quot;^1?&quot;,[388,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[388,&quot;^K&quot;,387,536870917]],[&quot;^1?&quot;,[388,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5372,&quot;^1G&quot;,6182],536870917]],[&quot;^1?&quot;,[388,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[388,&quot;^11&quot;,383,536870917]],[&quot;^1?&quot;,[388,&quot;^10&quot;,124,536870917]],[&quot;^1?&quot;,[388,&quot;^L&quot;,124,536870917]],[&quot;^1?&quot;,[388,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[388,&quot;^?&quot;,&quot;~u61b5336d-4067-4767-b6b4-cbb732349619&quot;,536870917]],[&quot;^1?&quot;,[389,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[389,&quot;^Y&quot;,&quot;&gt;In the context of eugenics, it’s understandable why Galton, Pearson, and Fisher would care so much about questions of existence. For the purposes of eugenic discrimination, it was enough to state that distinct racial subgroups existed or there was a “significant” correlation between intelligence and cleanliness or a “significant” difference in criminality, fertility, or disease incidence between people of different socioeconomic classes. The first hypotheses were taxonomic: whether individuals could be considered to be of the same species, or whether people were of the same race. The separation was everything—not how much, what else might explain it, or why it mattered, just that it was there. Significance testing did not spring fully formed from the heads of these men. It was crafted and refined over the years specifically to articulate evolutionary and eugenicist arguments. Galton, Pearson, and
