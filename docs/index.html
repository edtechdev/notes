&quot;,536870919]],[&quot;^1?&quot;,[383,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[383,&quot;^Y&quot;,&quot;&gt;Employee [[voice]] (an employee’s willingness to speak up about things) has been shown to be a critical element of successful [[workplace]] functioning in study after study.&quot;,536870919]],[&quot;^1?&quot;,[383,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[383,&quot;^K&quot;,382,536870919]],[&quot;^1?&quot;,[383,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,2165,&quot;^1H&quot;,2346],536870919]],[&quot;^1?&quot;,[383,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[383,&quot;^11&quot;,380,536870919]],[&quot;^1?&quot;,[383,&quot;^10&quot;,193,536870919]],[&quot;^1?&quot;,[383,&quot;^10&quot;,203,536870919]],[&quot;^1?&quot;,[383,&quot;^L&quot;,193,536870919]],[&quot;^1?&quot;,[383,&quot;^L&quot;,203,536870919]],[&quot;^1?&quot;,[383,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[383,&quot;^?&quot;,&quot;~u61b6f3e6-aa54-4583-94c4-2e9aea5c5332&quot;,536870919]],[&quot;^1?&quot;,[384,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[384,&quot;^Y&quot;,&quot;&gt;The manager may actually care about the points of view of their staff, but not more than their need to be in control&quot;,536870919]],[&quot;^1?&quot;,[384,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[384,&quot;^K&quot;,383,536870919]],[&quot;^1?&quot;,[384,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,2346,&quot;^1H&quot;,2468],536870919]],[&quot;^1?&quot;,[384,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[384,&quot;^11&quot;,380,536870919]],[&quot;^1?&quot;,[384,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[384,&quot;^?&quot;,&quot;~u61b6f3e6-b231-42e1-9534-5f7990ec32ce&quot;,536870919]],[&quot;^1?&quot;,[385,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[385,&quot;^Y&quot;,&quot;&gt;A good manager can’t white-knuckle the work; they have to trust in and empower their staff.&quot;,536870919]],[&quot;^1?&quot;,[385,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[385,&quot;^K&quot;,384,536870919]],[&quot;^1?&quot;,[385,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,2468,&quot;^1H&quot;,2567],536870919]],[&quot;^1?&quot;,[385,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[385,&quot;^11&quot;,380,536870919]],[&quot;^1?&quot;,[385,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[385,&quot;^?&quot;,&quot;~u61b6f3e6-256e-4189-ab42-fa3fff90972a&quot;,536870919]],[&quot;^1?&quot;,[386,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[386,&quot;^Y&quot;,&quot;&gt;We’ve got to let go of the idea of manager as “boss.”&quot;,536870919]],[&quot;^1?&quot;,[386,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[386,&quot;^K&quot;,385,536870919]],[&quot;^1?&quot;,[386,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,2567,&quot;^1H&quot;,2632],536870919]],[&quot;^1?&quot;,[386,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[386,&quot;^11&quot;,380,536870919]],[&quot;^1?&quot;,[386,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[386,&quot;^?&quot;,&quot;~u61b6f3e6-ef7d-49a2-a6b9-506d82da0e81&quot;,536870919]],[&quot;^1?&quot;,[387,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[387,&quot;^Y&quot;,&quot;&gt;Before asking for feedback, consider why you want to do that and how you plan to use what you learn. If you don’t have any plan for actually using the feedback, don’t ask for it. There is nothing worse than taking the time to thoughtfully provide feedback on something only to be completely ignored.&quot;,536870919]],[&quot;^1?&quot;,[387,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[387,&quot;^K&quot;,386,536870919]],[&quot;^1?&quot;,[387,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,2632,&quot;^1H&quot;,2941],536870919]],[&quot;^1?&quot;,[387,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[387,&quot;^11&quot;,380,536870919]],[&quot;^1?&quot;,[387,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[387,&quot;^?&quot;,&quot;~u61b6f3e6-3ea7-4ca8-953b-b789ccde8cec&quot;,536870919]],[&quot;^1?&quot;,[388,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[388,&quot;^Y&quot;,&quot;&gt;A manager who is really concerned with diversity, equity, and inclusion knows that making progress on this work requires empowering and giving voice to those with the least power in the organization. But in places with fearful or autocratic management, you sometimes see the (often White) people at the top running DEI work and deciding how that learning and engagement will trickle down to the (often more diverse) staff, some of whom may actually even have experience with this sort of work in other settings.&quot;,536870919]],[&quot;^1?&quot;,[388,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[388,&quot;^K&quot;,387,536870919]],[&quot;^1?&quot;,[388,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,2941,&quot;^1H&quot;,3458],536870919]],[&quot;^1?&quot;,[388,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[388,&quot;^11&quot;,380,536870919]],[&quot;^1?&quot;,[388,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[388,&quot;^?&quot;,&quot;~u61b6f3e6-fcc2-4fff-a7cb-9e74f64e7826&quot;,536870919]],[&quot;^1?&quot;,[389,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[389,&quot;^Y&quot;,&quot;&gt;“Listening theater” feels like gaslighting. In the moment, you might really feel like you’re being heard, but when your manager never takes action on anything you’ve discussed, you begin to feel like a ghost — like you’re talking to someone who literally doesn’t see or hear you. You question yourself — are your suggestions terrible? Really stupid? Is your manager just humoring you in the moment? Maybe there’s something wrong with you. You start to feel too embarrassed to bring things up (because clearly your ideas are truly awful).&quot;,536870919]],[&quot;^1?&quot;,[389,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[389,&quot;^K&quot;,388,536870919]],[&quot;^1?&quot;,[389,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,3458,&quot;^1H&quot;,4019],536870919]],[&quot;^1?&quot;,[389,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[389,&quot;^11&quot;,380,536870919]],[&quot;^1?&quot;,[389,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[389,&quot;^?&quot;,&quot;~u61b6f3e6-c68f-4e2c-b25c-57ba8fb9e6be&quot;,536870919]],[&quot;^1?&quot;,[390,&quot;^1C&quot;,[&quot;^1D&quot;,[[&quot;^?&quot;,&quot;~u61b6f3e6-ed75-4f0d-abe8-567baac5c52e&quot;]]],536870919]],[&quot;^1?&quot;,[390,&quot;^Y&quot;,&quot;[What Good Feedback Really Looks Like](https://hbr.org/2019/05/what-good-feedback-really-looks-like)&quot;,536870919]],[&quot;^1?&quot;,[390,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[390,&quot;^K&quot;,380,536870919]],[&quot;^1?&quot;,[390,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,4019,&quot;^1H&quot;,4123],536870919]],[&quot;^1?&quot;,[390,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[390,&quot;^11&quot;,102,536870919]],[&quot;^1?&quot;,[390,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[390,&quot;^?&quot;,&quot;~u61b6f3e6-e2cf-4f3d-8c28-87b83aad7089&quot;,536870919]],[&quot;^1?&quot;,[391,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[391,&quot;^Y&quot;,&quot;[[Constructive criticism]], [[Feedback]]&quot;,536870919]],[&quot;^1?&quot;,[391,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[391,&quot;^K&quot;,390,536870919]],[&quot;^1?&quot;,[391,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,4123,&quot;^1H&quot;,4168],536870919]],[&quot;^1?&quot;,[391,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[391 t;,127,536870919]],[&quot;^1?&quot;,[397,&quot;^10&quot;,151,536870919]],[&quot;^1?&quot;,[397,&quot;^L&quot;,98,536870919]],[&quot;^1?&quot;,[397,&quot;^L&quot;,117,536870919]],[&quot;^1?&quot;,[397,&quot;^L&quot;,127,536870919]],[&quot;^1?&quot;,[397,&quot;^L&quot;,151,536870919]],[&quot;^1?&quot;,[397,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[397,&quot;^?&quot;,&quot;~u61b6f3e6-9f8d-4845-98aa-caa0a46a4f90&quot;,536870919]],[&quot;^1?&quot;,[398,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[398,&quot;^Y&quot;,&quot;&gt;[[Gatekeeping]]: Fisher acted as a gatekeeper for the profession of statistics, encouraging what he considered to be the right types to enter, and as his words make clear, he considered the right type of statistician to be one most like himself.&quot;,536870919]],[&quot;^1?&quot;,[398,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[398,&quot;^K&quot;,397,536870919]],[&quot;^1?&quot;,[398,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,4663,&quot;^1H&quot;,4914],536870919]],[&quot;^1?&quot;,[398,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[398,&quot;^11&quot;,396,536870919]],[&quot;^1?&quot;,[398,&quot;^10&quot;,174,536870919]],[&quot;^1?&quot;,[398,&quot;^L&quot;,174,536870919]],[&quot;^1?&quot;,[398,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[398,&quot;^?&quot;,&quot;~u61b6f3e6-104d-480c-b1e6-8c4136da0b0d&quot;,536870919]],[&quot;^1?&quot;,[399,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[399,&quot;^Y&quot;,&quot;&gt;Pretending to answer them under a veil of [[objectivity]] serves to dehumanize our colleagues&quot;,536870919]],[&quot;^1?&quot;,[399,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[399,&quot;^K&quot;,398,536870919]],[&quot;^1?&quot;,[399,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,4914,&quot;^1H&quot;,5013],536870919]],[&quot;^1?&quot;,[399,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[399,&quot;^11&quot;,396,536870919]],[&quot;^1?&quot;,[399,&quot;^10&quot;,170,536870919]],[&quot;^1?&quot;,[399,&quot;^L&quot;,170,536870919]],[&quot;^1?&quot;,[399,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[399,&quot;^?&quot;,&quot;~u61b6f3e6-b2fc-4c1b-8f82-f44c5318368a&quot;,536870919]],[&quot;^1?&quot;,[400,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[400,&quot;^Y&quot;,&quot;&gt;In the 1972 book [[Social Science]]s as Sorcery, Stanislav Andreski argued that, in their search for [[objectivity]], researchers had settled for a cheap version of it, hiding behind statistical methods as “quantitative camouflage.” Instead, we should strive for the moral objectivity we need to simultaneously live in the world and study it. #quote&quot;,536870919]],[&quot;^1?&quot;,[400,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[400,&quot;^K&quot;,399,536870919]],[&quot;^1?&quot;,[400,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,5013,&quot;^1H&quot;,5372],536870919]],[&quot;^1?&quot;,[400,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[400,&quot;^11&quot;,396,536870919]],[&quot;^1?&quot;,[400,&quot;^10&quot;,131,536870919]],[&quot;^1?&quot;,[400,&quot;^10&quot;,170,536870919]],[&quot;^1?&quot;,[400,&quot;^10&quot;,194,536870919]],[&quot;^1?&quot;,[400,&quot;^L&quot;,131,536870919]],[&quot;^1?&quot;,[400,&quot;^L&quot;,170,536870919]],[&quot;^1?&quot;,[400,&quot;^L&quot;,194,536870919]],[&quot;^1?&quot;,[400,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[400,&quot;^?&quot;,&quot;~u61b6f3e6-6a2f-4cab-bc2c-57ac7755214c&quot;,536870919]],[&quot;^1?&quot;,[401,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[401,&quot;^Y&quot;,&quot;&gt;a scientific hypothesis is never just a statistical hypothesis—that two means in the population are different, that two variables are correlated, that a treatment has some nonzero effect—but an attempt at explaining why, by how much, and why it matters. The fact that significance testing ignores this is what economists Deirdre McCloskey and Stephen Ziliak in their 2008 book The Cult of [[Statistical Significance]] called the “sizeless stare of statistical significance.” As they put it, “Statistical significance is not a scientific test. It is a philosophical, qualitative test. It does not ask how much. It asks ‘whether,’ ”—as in, whether an effect or association simply exists. “Existence, the question of whether, is interesting,” they said, “but it is not scientific.”&quot;,536870919]],[&quot;^1?&quot;,[401,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[401,&quot;^K&quot;,400,536870919]],[&quot;^1?&quot;,[401,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,5372,&quot;^1H&quot;,6182],536870919]],[&quot;^1?&quot;,[401,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[401,&quot;^11&quot;,396,536870919]],[&quot;^1?&quot;,[401,&quot;^10&quot;,127,536870919]],[&quot;^1?&quot;,[401,&quot;^L&quot;,127,536870919]],[&quot;^1?&quot;,[401,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[401,&quot;^?&quot;,&quot;~u61b6f3e6-8dc3-4d23-8f37-984cc8ccfbd7&quot;,536870919]],[&quot;^1?&quot;,[402,&quot;^1C&quot;,[&quot;^1D&quot;,[]],536870919]],[&quot;^1?&quot;,[402,&quot;^Y&quot;,&quot;&gt;In the context of eugenics, it’s understandable why Galton, Pearson, and Fisher would care so much about questions of existence. For the purposes of eugenic discrimination, it was enough to state that distinct racial subgroups existed or there was a “significant” correlation between intelligence and cleanliness or a “significant” difference in criminality, fertility, or disease incidence between people of different socioeconomic classes. The first hypotheses were taxonomic: whether individuals could be considered to be of the same species, or whether people were of the same race. The separation was everything—not how much, what else might explain it, or why it mattered, just that it was there. Significance testing did not spring fully formed from the heads of these men. It was crafted and refined over the years specifically to articulate evolutionary and eugenicist arguments. Galton, Pearson, and Fisher the eugenicists needed a quantitative way to argue for the existence of such differences, and Galton, Pearson, and Fisher the statisticians answered the call with significance testing.&quot;,536870919]],[&quot;^1?&quot;,[402,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[402,&quot;^K&quot;,401,536870919]],[&quot;^1?&quot;,[402,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,6182,&quot;^1H&quot;,7301],536870919]],[&quot;^1?&quot;,[402,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[402,&quot;^11&quot;,396,536870919]],[&quot;^1?&quot;,[402,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[402,&quot;^?&quot;,&quot;~u61b6f3e6-fb33-4675-8d12-ead72742357c&quot;,536870919]],[&quot;^1?&quot;,[403,&quot;^1C&quot;,[&quot;^1D&quot;,[[&quot;^?&quot;,&quot;~u61b6f3e6-09d3-40a1-ba8e-04f318a0be7b&quot;],[&quot;^?&quot;,&quot;~u61b6f3e6-b7c2-49a4-b284-6a43522b347c&quot;]]],536870919]],[&quot;^1?&quot;,[403,&quot;^Y&quot;,&quot;[Efforts to Toughen Teacher Evaluations Show No Positive Impact on Students](https://www.edweek.org/teaching-learning/efforts-to-toughen-teacher-evaluations-show-no-positive-impact-on-students/2021/11)&quot;,536870919]],[&quot;^1?&quot;,[403,&quot;^V&quot;,&quot;^1@&quot;,536870919]],[&quot;^1?&quot;,[403,&quot;^K&quot;,396,536870919]],[&quot;^1?&quot;,[403,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1E&quot;,[],&quot;^1F&quot;,[],&quot;^1G&quot;,7301,&quot;^1H&quot;,7506],536870919]],[&quot;^1?&quot;,[403,&quot;^15&quot;,102,536870919]],[&quot;^1?&quot;,[403,&quot;^11&quot;,102,536870919]],[&quot;^1?&quot;,[403,&quot;^1A&quot;,true,536870919]],[&quot;^1?&quot;,[403,&quot;^?&quot;,&quot;~u61b6f3e6-00f9-4e53-9e0e-c5caaead40ea&quot;,536870919]],[&quot;^1?&quot;,[404,&quot;^1C&quot;
