moring you in the moment? Maybe there’s something wrong with you. You start to feel too embarrassed to bring things up (because clearly your ideas are truly awful).&quot;,536870917]],[&quot;^1?&quot;,[373,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[373,&quot;^K&quot;,372,536870917]],[&quot;^1?&quot;,[373,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,3458,&quot;^1G&quot;,4019],536870917]],[&quot;^1?&quot;,[373,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[373,&quot;^11&quot;,364,536870917]],[&quot;^1?&quot;,[373,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[373,&quot;^?&quot;,&quot;~u61b51fe1-2cdd-4481-a00f-7e40544489cc&quot;,536870917]],[&quot;^1?&quot;,[374,&quot;^1A&quot;,[&quot;^1B&quot;,[[&quot;^?&quot;,&quot;~u61b51fe1-91a2-4e41-b2f0-666998f4cfa6&quot;]]],536870917]],[&quot;^1?&quot;,[374,&quot;^Y&quot;,&quot;[What Good Feedback Really Looks Like](https://hbr.org/2019/05/what-good-feedback-really-looks-like)&quot;,536870917]],[&quot;^1?&quot;,[374,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[374,&quot;^K&quot;,364,536870917]],[&quot;^1?&quot;,[374,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4019,&quot;^1G&quot;,4123],536870917]],[&quot;^1?&quot;,[374,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[374,&quot;^11&quot;,99,536870917]],[&quot;^1?&quot;,[374,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[374,&quot;^?&quot;,&quot;~u61b51fe1-5650-4843-9808-117882a8d167&quot;,536870917]],[&quot;^1?&quot;,[375,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[375,&quot;^Y&quot;,&quot;[[Constructive criticism]], [[Feedback]]&quot;,536870917]],[&quot;^1?&quot;,[375,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[375,&quot;^K&quot;,374,536870917]],[&quot;^1?&quot;,[375,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4123,&quot;^1G&quot;,4168],536870917]],[&quot;^1?&quot;,[375,&quot;^ ,[383,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[383,&quot;^11&quot;,380,536870917]],[&quot;^1?&quot;,[383,&quot;^10&quot;,165,536870917]],[&quot;^1?&quot;,[383,&quot;^L&quot;,165,536870917]],[&quot;^1?&quot;,[383,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[383,&quot;^?&quot;,&quot;~u61b51fe1-6f64-4dd9-96e4-e20990a13d33&quot;,536870917]],[&quot;^1?&quot;,[384,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[384,&quot;^Y&quot;,&quot;&gt;In the 1972 book [[Social Science]]s as Sorcery, Stanislav Andreski argued that, in their search for [[objectivity]], researchers had settled for a cheap version of it, hiding behind statistical methods as “quantitative camouflage.” Instead, we should strive for the moral objectivity we need to simultaneously live in the world and study it. #quote&quot;,536870917]],[&quot;^1?&quot;,[384,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[384,&quot;^K&quot;,383,536870917]],[&quot;^1?&quot;,[384,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5013,&quot;^1G&quot;,5372],536870917]],[&quot;^1?&quot;,[384,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[384,&quot;^11&quot;,380,536870917]],[&quot;^1?&quot;,[384,&quot;^10&quot;,128,536870917]],[&quot;^1?&quot;,[384,&quot;^10&quot;,165,536870917]],[&quot;^1?&quot;,[384,&quot;^10&quot;,187,536870917]],[&quot;^1?&quot;,[384,&quot;^L&quot;,128,536870917]],[&quot;^1?&quot;,[384,&quot;^L&quot;,165,536870917]],[&quot;^1?&quot;,[384,&quot;^L&quot;,187,536870917]],[&quot;^1?&quot;,[384,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[384,&quot;^?&quot;,&quot;~u61b51fe1-53ef-440e-a5d2-4369f7a43a0d&quot;,536870917]],[&quot;^1?&quot;,[385,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[385,&quot;^Y&quot;,&quot;&gt;a scientific hypothesis is never just a statistical hypothesis—that two means in the population are different, that two variables are correlated, that a treatment has some nonzero effect—but an attempt at explaining why, by how much, and why it matters. The fact that significance testing ignores this is what economists Deirdre McCloskey and Stephen Ziliak in their 2008 book The Cult of [[Statistical Significance]] called the “sizeless stare of statistical significance.” As they put it, “Statistical significance is not a scientific test. It is a philosophical, qualitative test. It does not ask how much. It asks ‘whether,’ ”—as in, whether an effect or association simply exists. “Existence, the question of whether, is interesting,” they said, “but it is not scientific.”&quot;,536870917]],[&quot;^1?&quot;,[385,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[385,&quot;^K&quot;,384,536870917]],[&quot;^1?&quot;,[385,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5372,&quot;^1G&quot;,6182],536870917]],[&quot;^1?&quot;,[385,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[385,&quot;^11&quot;,380,536870917]],[&quot;^1?&quot;,[385,&quot;^10&quot;,124,536870917]],[&quot;^1?&quot;,[385,&quot;^L&quot;,124,536870917]],[&quot;^1?&quot;,[385,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[385,&quot;^?&quot;,&quot;~u61b51fe1-eb93-49f1-b03c-b080c516d6f8&quot;,536870917]],[&quot;^1?&quot;,[386,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[386,&quot;^Y&quot;,&quot;&gt;In the context of eugenics, it’s understandable why Galton, Pearson, and Fisher would care so much about questions of existence. For the purposes of eugenic discrimination, it was enough to state that distinct racial subgroups existed or there was a “significant” correlation between intelligence and cleanliness or a “significant” difference in criminality, fertility, or disease incidence between people of different socioeconomic classes. The first hypotheses were taxonomic: whether individuals could be considered to be of the same species, or whether people were of the same race. The separation was everything—not how much, what else might explain it, or why it mattered, just that it was there. Significance testing did not spring fully formed from the heads of these men. It was crafted and refined over the years specifically to articulate evolutionary and eugenicist arguments. Galton, Pearson, and Fisher the eugenicists needed a quantitative way to argue for the existence of such differences, and Galton, Pearson, and Fisher the statisticians answered the call with significance testing.&quot;,536870917]],[&quot;^1?&quot;,[386,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[386,&quot;^K&quot;,385,536870917]],[&quot;^1?&quot;,[386,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,6182,&quot;^1G&quot;,7301],536870917]],[&quot;^1?&quot;,[386,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[386,&quot;^11&quot;,380,536870917]],[&quot;^1?&quot;,[386,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[386,&quot;^?&quot;,&quot;~u61b51fe1-d20e-4c6d-b874-6bfc3531c9cf&quot;,536870917]],[&quot;^1?&quot;,[387,&quot;^1A&quot;,[&quot;^1B&quot;,[[&quot;^?&quot;,&quot;~u61b51fe1-f67d-4d2f-b850-1cef08b1dc41&quot;],[&quot;^?&quot;,&quot;~u61b51fe1-a0aa-43e9-8ab5-a78d55b7eda4&quot;]]],536870917]],[&quot;^1?&quot;,[387,&quot;^Y&quot;,&quot;[Efforts to Toughen Teacher Evaluations Show No Positive Impact on Students](https://www.edweek.org/teaching-learning/efforts-to-toughen-teacher-evaluations-show-no-positive-impact-on-students/2021/11)&quot;,536870917]],[&quot;^1?&quot;,[387,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[387,&quot;^K&quot;,380,536870917]],[&quot;^1?&quot;,[387,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,7301,&quot;^1G&quot;,7506],536870917]],[&quot;^1?&quot;,[387,&quot;^15&quot;,99,536870917]],[&quot;^1?&quot;,[387,&quot;^11&quot;,99,536870917]],[&quot;^1?&quot;,[387,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[387,&quot;^?&quot;,&quot;~u61b51fe1-6db3-466e-b31f-eac1db8e203e&quot;,536870917]],[&quot;^
