t;,[],&quot;^1F&quot;,2567,&quot;^1G&quot;,2632],536870917]],[&quot;^1?&quot;,[380,&quot;^15&quot;,100,536870917]],[&quot;^1?&quot;,[380,&quot;^11&quot;,374,536870917]],[&quot;^1?&quot;,[380,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[380,&quot;^?&quot;,&quot;~u61b5f856-358e-4482-8977-657169932326&quot;,536870917]],[&quot;^1?&quot;,[381,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[381,&quot;^Y&quot;,&quot;&gt;Before asking for feedback, consider why you want to do that and how you plan to use what you learn. If you don’t have any plan for actually using the feedback, don’t ask for it. There is nothing worse than taking the time to thoughtfully provide feedback on something only to be completely ignored.&quot;,536870917]],[&quot;^1?&quot;,[381,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[381,&quot;^K&quot;,380,536870917]],[&quot;^1?&quot;,[381,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2632,&quot;^1G&quot;,2941],536870917]],[&quot;^1?&quot;,[381,&quot;^15&quot;,100,536870917]],[&quot;^1?&quot;,[381,&quot;^11&quot;,374,536870917]],[&quot;^1?&quot;,[381,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[381,&quot;^?&quot;,&quot;~u61b5f856-8c9a-41ba-a81a-13d51a89f003&quot;,536870917]],[&quot;^1?&quot;,[382,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[382,&quot;^Y&quot;,&quot;&gt;A manager who is really concerned with diversity, equity, and inclusion knows that making progress on this work requires empowering and giving voice to those with the least power in the organization. But in places with fearful or autocratic management, you sometimes see the (often White) people at the top running DEI work and deciding how that learning and engagement will trickle down to the (often more diverse) staff, some of whom may actually even have experience with this sort of work in other settings.&quot;,536870917]],[&quot;^1?&quot;,[382,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[382,&quot;^K&quot;,381,536870917]],[&quot;^1?&quot;,[382,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,2941,&quot;^1G&quot;,3458],536870917]],[&quot;^1?&quot;,[382,&quot;^15&quot;,100,536870917]],[&quot;^1?&quot;,[382,&quot;^11&quot;,374,536870917]],[&quot;^1?&quot;,[382,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[382,&quot;^?&quot;,&quot;~u61b5f856-f4e4-41f1-b2ed-db3d61e47333&quot;,536870917]],[&quot;^1?&quot;,[383,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[383,&quot;^Y&quot;,&quot;&gt;“Listening theater” feels like gaslighting. In the moment, you might really feel like you’re being heard, but when your manager never takes action on anything you’ve discussed, you begin to feel like a ghost — like you’re talking to someone who literally doesn’t see or hear you. You question yourself — are your suggestions terrible? Really stupid? Is your manager just humoring you in the moment? Maybe there’s something wrong with you. You start to feel too embarrassed to bring things up (because clearly your ideas are truly awful).&quot;,536870917]],[&quot;^1?&quot;,[383,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[383,&quot;^K&quot;,382,536870917]],[&quot;^1?&quot;,[383,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,3458,&quot;^1G&quot;,4019],536870917]],[&quot;^1?&quot;,[383,&quot;^15&quot;,100,536870917]],[&quot;^1?&quot;,[383,&quot;^11&quot;,374,536870917]],[&quot;^1?&quot;,[383,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[383,&quot;^?&quot;,&quot;~u61b5f856-5c36-4e52-a5e1-b060787a098c&quot;,536870917]],[&quot;^1?&quot;,[384,&quot;^1A&quot;,[&quot;^1B&quot;,[[&quot;^?&quot;,&quot;~u61b5f856-c80f-45c0-854d-5ca96a108d4c&quot;]]],536870917]],[&quot;^1?&quot;,[384,&quot;^Y&quot;,&quot;[What Good Feedback Really Looks Like](https://hbr.org/2019/05/what-good-feedback-really-looks-like)&quot;,536870917]],[&quot;^1?&quot;,[384,&quot;^V&quot;, ^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4663,&quot;^1G&quot;,4914],536870917]],[&quot;^1?&quot;,[392,&quot;^15&quot;,100,536870917]],[&quot;^1?&quot;,[392,&quot;^11&quot;,390,536870917]],[&quot;^1?&quot;,[392,&quot;^10&quot;,171,536870917]],[&quot;^1?&quot;,[392,&quot;^L&quot;,171,536870917]],[&quot;^1?&quot;,[392,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[392,&quot;^?&quot;,&quot;~u61b5f856-61dd-44fb-879c-bd15a33d6937&quot;,536870917]],[&quot;^1?&quot;,[393,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[393,&quot;^Y&quot;,&quot;&gt;Pretending to answer them under a veil of [[objectivity]] serves to dehumanize our colleagues&quot;,536870917]],[&quot;^1?&quot;,[393,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[393,&quot;^K&quot;,392,536870917]],[&quot;^1?&quot;,[393,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,4914,&quot;^1G&quot;,5013],536870917]],[&quot;^1?&quot;,[393,&quot;^15&quot;,100,536870917]],[&quot;^1?&quot;,[393,&quot;^11&quot;,390,536870917]],[&quot;^1?&quot;,[393,&quot;^10&quot;,167,536870917]],[&quot;^1?&quot;,[393,&quot;^L&quot;,167,536870917]],[&quot;^1?&quot;,[393,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[393,&quot;^?&quot;,&quot;~u61b5f856-61ab-479d-bb1f-2e5c7cdedc96&quot;,536870917]],[&quot;^1?&quot;,[394,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[394,&quot;^Y&quot;,&quot;&gt;In the 1972 book [[Social Science]]s as Sorcery, Stanislav Andreski argued that, in their search for [[objectivity]], researchers had settled for a cheap version of it, hiding behind statistical methods as “quantitative camouflage.” Instead, we should strive for the moral objectivity we need to simultaneously live in the world and study it. #quote&quot;,536870917]],[&quot;^1?&quot;,[394,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[394,&quot;^K&quot;,393,536870917]],[&quot;^1?&quot;,[394,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5013,&quot;^1G&quot;,5372],536870917]],[&quot;^1?&quot;,[394,&quot;^15&quot;,100,536870917]],[&quot;^1?&quot;,[394,&quot;^11&quot;,390,536870917]],[&quot;^1?&quot;,[394,&quot;^10&quot;,129,536870917]],[&quot;^1?&quot;,[394,&quot;^10&quot;,167,536870917]],[&quot;^1?&quot;,[394,&quot;^10&quot;,191,536870917]],[&quot;^1?&quot;,[394,&quot;^L&quot;,129,536870917]],[&quot;^1?&quot;,[394,&quot;^L&quot;,167,536870917]],[&quot;^1?&quot;,[394,&quot;^L&quot;,191,536870917]],[&quot;^1?&quot;,[394,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[394,&quot;^?&quot;,&quot;~u61b5f856-998e-409e-b5e1-11d0d05ef3bc&quot;,536870917]],[&quot;^1?&quot;,[395,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[395,&quot;^Y&quot;,&quot;&gt;a scientific hypothesis is never just a statistical hypothesis—that two means in the population are different, that two variables are correlated, that a treatment has some nonzero effect—but an attempt at explaining why, by how much, and why it matters. The fact that significance testing ignores this is what economists Deirdre McCloskey and Stephen Ziliak in their 2008 book The Cult of [[Statistical Significance]] called the “sizeless stare of statistical significance.” As they put it, “Statistical significance is not a scientific test. It is a philosophical, qualitative test. It does not ask how much. It asks ‘whether,’ ”—as in, whether an effect or association simply exists. “Existence, the question of whether, is interesting,” they said, “but it is not scientific.”&quot;,536870917]],[&quot;^1?&quot;,[395,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[395,&quot;^K&quot;,394,536870917]],[&quot;^1?&quot;,[395,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,5372,&quot;^1G&quot;,6182],536870917]],[&quot;^1?&quot;,[395,&quot;^15&quot;,100,536870917]],[&quot;^1?&quot;,[395,&quot;^11&quot;,390,536870917]],[&quot;^1?&quot;,[395,&quot;^10&quot;,125,536870917]],[&quot;^1?&quot;,[395,&quot;^L&quot;,125,536870917]],[&quot;^1?&quot;,[395,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[395,&quot;^?&quot;,&quot;~u61b5f856-92d6-47e1-ab1e-946cff0cabfc&quot;,536870917]],[&quot;^1?&quot;,[396,&quot;^1A&quot;,[&quot;^1B&quot;,[]],536870917]],[&quot;^1?&quot;,[396,&quot;^Y&quot;,&quot;&gt;In the context of eugenics, it’s understandable why Galton, Pearson, and Fisher would care so much about questions of existence. For the purposes of eugenic discrimination, it was enough to state that distinct racial subgroups existed or there was a “significant” correlation between intelligence and cleanliness or a “significant” difference in criminality, fertility, or disease incidence between people of different socioeconomic classes. The first hypotheses were taxonomic: whether individuals could be considered to be of the same species, or whether people were of the same race. The separation was everything—not how much, what else might explain it, or why it mattered, just that it was there. Significance testing did not spring fully formed from the heads of these men. It was crafted and refined over the years specifically to articulate evolutionary and eugenicist arguments. Galton, Pearson, and Fisher the eugenicists needed a quantitative way to argue for the existence of such differences, and Galton, Pearson, and Fisher the statisticians answered the call with significance testing.&quot;,536870917]],[&quot;^1?&quot;,[396,&quot;^V&quot;,&quot;^1C&quot;,536870917]],[&quot;^1?&quot;,[396,&quot;^K&quot;,395,536870917]],[&quot;^1?&quot;,[396,&quot;^T&quot;,[&quot;^ &quot;,&quot;^1D&quot;,[],&quot;^1E&quot;,[],&quot;^1F&quot;,6182,&quot;^1G&quot;,7301],536870917]],[&quot;^1?&quot;,[396,&quot;^15&quot;,100,536870917]],[&quot;^1?&quot;,[396,&quot;^11&quot;,390,536870917]],[&quot;^1?&quot;,[396,&quot;^1H&quot;,true,536870917]],[&quot;^1?&quot;,[396,&quot;^?&quot;,&quot;~u61b5f856-c09f-4166-a901-17f7bf76510b&quot;,536870917]],[&quot;^1?&quot;,[397,&quot;^1A
